<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#fff}
#map{position:absolute;top:0;left:0;right:0;bottom:0}
.header{position:absolute;top:12px;left:14px;z-index:1000;display:flex;gap:6px;align-items:center}
.header h1{color:#E1251B;font-size:22px;font-weight:700;letter-spacing:-0.3px;text-shadow:0 1px 3px rgba(0,0,0,0.15)}
.badge{background:#E1251B;color:#fff;font-size:9px;font-weight:600;padding:2px 5px;border-radius:4px;letter-spacing:0.3px;margin-top:2px}
.layerPanel{position:absolute;top:52px;left:10px;z-index:1000;display:flex;flex-direction:column;gap:6px}
.layerBtn{width:42px;height:42px;border-radius:12px;border:none;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,0.12);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all 0.15s;color:#444;padding:0}
.layerBtn.active{background:#E1251B;color:#fff;box-shadow:0 2px 10px rgba(225,37,27,0.3)}
.layerBtn:active{transform:scale(0.92)}
.layerLabel{font-size:7px;font-weight:600;letter-spacing:0.2px;margin-top:1px;line-height:1}
.active .layerLabel{color:#fff}
.locationBtn{position:absolute;bottom:120px;right:12px;z-index:1000;width:40px;height:40px;border-radius:20px;border:none;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,0.12);font-size:18px;cursor:pointer;color:#E1251B;transition:all 0.15s}
.locationBtn:active{transform:scale(0.9)}
.locationBtn.active{color:#007AFF}
.popupContent{font-size:13px;min-width:160px;max-width:260px}
.popupContent h3{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:2px}
.popupContent .code{color:#888;font-size:11px;font-weight:500;margin-bottom:4px}
.popupContent .road{color:#999;font-size:11px;margin-bottom:6px}
.arrivals{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.arrival{background:#f5f5f5;border-radius:6px;padding:4px 7px;font-size:11px;display:flex;align-items:center;gap:4px}
.arrival .svc{font-weight:700;color:#E1251B;font-size:11px}
.arrival .time{color:#333;font-size:12px;font-weight:600}
.arrival .time.arr{color:#34C759}
.loading{color:#999;font-size:11px;margin-top:2px;font-style:italic}
.error{color:#FF3B30;font-size:11px;margin-top:2px}
.attribution{position:absolute;bottom:2px;left:4px;z-index:999;font-size:9px;color:#888;background:rgba(255,255,255,0.7);border-radius:4px;padding:1px 5px}
@media(max-width:400px){.header h1{font-size:19px}.layerBtn{width:36px;height:36px;font-size:14px}.layerLabel{font-size:6px}}
</style>

<button class="locationBtn" id="locateBtn" onclick="locateMe()">📍</button>

// ===== MAP =====
const map=L.map('map',{zoomControl:false,attributionControl:false}).setView(CENTER,ZOOM);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19,detectRetina:true
}).addTo(map);

map.on('moveend',debouncedRefresh);

function debouncedRefresh(){
  if(refreshTimer)clearTimeout(refreshTimer);
  refreshTimer=setTimeout(refreshMap,200);
}

// ===== LOAD BUS STOPS =====
async function loadBusStops(){
  try{
    const resp=await fetch('bus-stops.json');
    busStops=await resp.json();
    console.log(`Loaded ${busStops.length} bus stops`);
    refreshMap();
  }catch(e){
    console.error('Failed to load bus stops:',e);
    // Fallback: load inline
    busStops=window._FALLBACK_STOPS||[];
    refreshMap();
  }
}

// ===== REFRESH MAP (viewport filter) =====
function refreshMap(){
  const bounds=map.getBounds();
  if(!bounds)return;
  
  if(state.bus&&busStops.length)renderBusLayer(bounds);
  if(state.mrt)renderMrtLayer(bounds);
  if(state.carpark)renderCarparkLayer(bounds);
  if(state.traffic)renderTrafficLayer(bounds);
}

// ===== RENDER BUS LAYER =====
function renderBusLayer(bounds){
  // Remove old markers
  currBusMarkers.forEach(m=>map.removeLayer(m));
  currBusMarkers=[];
  
  const visible=busStops.filter(s=>
    s.lt>=bounds.getSouth()&&s.lt<=bounds.getNorth()&&
    s.ln>=bounds.getWest()&&s.ln<=bounds.getEast()
  );
  
  // Limit to ~200 max for performance
  const limited=visible.length>300?visible.filter((_,i)=>i%2===0):visible;
  
  limited.forEach(s=>{
    const code=s.c.slice(-2);
    const mkr=L.circleMarker([s.lt,s.ln],{
      radius:7,color:'#bbb',fillColor:'#eee',fillOpacity:1,weight:1.5,opacity:0.85
    }).bindPopup(`
      <div class="popupContent">
        <h3>${s.d}</h3>
        <div class="code">${s.c} · ${s.r}</div>
        <div class="loading" id="arr-${s.c}">Loading arrivals...</div>
      </div>
    `).on('popupopen',()=>fetchArrivals(s.c,s.d));
    currBusMarkers.push(mkr);
    map.addLayer(mkr);
  });
}

// ===== RENDER MRT LAYER =====
function renderMrtLayer(bounds){
  currMrtMarkers.forEach(m=>map.removeLayer(m));
  currMrtMarkers=[];
  
  // Deduplicate stations (same name on multiple lines)
  const seen={};
  FULL_MRT.filter(s=>
    s.lt>=bounds.getSouth()&&s.lt<=bounds.getNorth()&&
    s.ln>=bounds.getWest()&&s.ln<=bounds.getEast()
  ).forEach(s=>{
    const key=s.lt.toFixed(4)+','+s.ln.toFixed(4);
    if(!seen[key])seen[key]={n:s.n,l:[],lt:s.lt,ln:s.ln};
    seen[key].l.push(s.c);
  });
  
  Object.values(seen).forEach(s=>{
    const color=MRT_LINES[s.l[0]]?.color||'#999';
    const mkr=L.circleMarker([s.lt,s.ln],{
      radius:10,color:'#fff',fillColor:color,fillOpacity:1,weight:2.5
    }).bindPopup(`
      <div class="popupContent">
        <h3 style="color:${color}">🚇 ${s.n}</h3>
        <div class="code">${s.l.join('/')}</div>
      </div>
    `);
    currMrtMarkers.push(mkr);
    map.addLayer(mkr);
  });
}

    c.lt>=bounds.getSouth()&&c.lt<=bounds.getNorth()&&

    `);

    map.addLayer(mkr);

// ===== LTA API =====
async function fetchArrivals(code,name){
  const el=document.getElementById(`arr-${code}`);
  if(!el)return;
  el.innerHTML='Loading...';
  el.className='loading';
  try{
    const resp=await fetch(`${PROXY_URL}/api/bus-arrival?BusStopCode=${code}`);
    if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
    const data=await resp.json();
    const services=data.Services||[];
    if(!services.length){el.innerHTML='<span class="error">No buses</span>';return}
    let html='<div class="arrivals">';
    services.slice(0,6).forEach(s=>{
      const t1=s.NextBus?.EstimatedArrival;
      const t2=s.SubsequentBus?.EstimatedArrival;
      const a1=t1?fmtTime(t1):'-';
      const a2=t2?fmtTime(t2):'-';
      html+=`<div class="arrival"><span class="svc">${s.ServiceNo}</span><span class="time ${a1==='Arr'?'arr':''}">${a1}</span><span style="color:#bbb;font-size:10px">${a2}</span></div>`;
    });
    html+='</div>';
    el.innerHTML=html;
    el.className='';
  }catch(e){
    el.innerHTML=`<span class="error">${e.message}</span>`;
    el.className='error';
  }
}

function fmtTime(iso){
  if(!iso)return'-';
  const d=(new Date(iso)-Date.now())/60000;
  if(d<1)return'Arr';
  if(d<60)return Math.floor(d)+'m';
  return Math.floor(d/60)+'h'+Math.floor(d%60)+'m';
}

async function fetchCarpark(name){
  const el=document.getElementById(`cp-${name.replace(/\s/g,'')}`);
  if(!el)return;
  el.innerHTML='Checking...';
  el.className='loading';
  try{
    const resp=await fetch(`${PROXY_URL}/api/carpark`);
    if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
    const data=await resp.json();
    const cp=(data.value||data||[]).find(c=>c.Development?.toLowerCase().includes(name.toLowerCase().slice(0,6)));
    if(cp)el.innerHTML=`<span style="color:#34C759">${cp.AvailableLots||0}/${cp.TotalLots||0} lots</span>`;
    else el.innerHTML='<span style="color:#999">No data</span>';
    el.className='';
  }catch(e){
    el.innerHTML=`<span class="error">${e.message}</span>`;
  }
}

// ===== LAYER TOGGLES =====
function toggleLayer(name){
  state[name]=!state[name];
  const idx={bus:0,mrt:1,carpark:2,traffic:3}[name];
  document.querySelectorAll('.layerBtn')[idx].classList.toggle('active',state[name]);
  
  if(state[name])refreshMap();
  else{
    const markers={bus:currBusMarkers,mrt:currMrtMarkers,carpark:currCpMarkers,traffic:currTcMarkers}[name];
    markers.forEach(m=>map.removeLayer(m));
    markers.length=0;
  }
}

// ===== LOCATE =====
function locateMe(){
  if(!navigator.geolocation){alert('Geolocation not supported');return}
  const btn=document.getElementById('locateBtn');
  btn.textContent='⏳';
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const{latitude,longitude}=pos.coords;
      if(userMarker)map.removeLayer(userMarker);
      if(userCircle)map.removeLayer(userCircle);
      userMarker=L.marker([latitude,longitude],{
        icon:L.divIcon({
          html:'<div style="width:20px;height:20px;border-radius:10px;background:#007AFF;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3)"></div>',
          iconSize:[20,20],iconAnchor:[10,10]
        })
      }).addTo(map).bindPopup('<div class="popupContent"><h3>📍 You are here</h3></div>');
      userCircle=L.circle([latitude,longitude],{
        radius:50,color:'#007AFF',fillColor:'#007AFF',fillOpacity:0.08,weight:2
      }).addTo(map);
      map.setView([latitude,longitude],15);
      btn.textContent='📍';
    },
    err=>{
      btn.textContent='📍';
      if(err.code===1)alert('Please allow location access');
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:30000}
  );
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>{
  loadBusStops();
  if(navigator.geolocation)setTimeout(locateMe,800);
});
