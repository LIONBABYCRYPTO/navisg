// ===== LAYER INIT =====
function createBusLayer(){
  const layer=L.layerGroup();
  BUS_STOPS.forEach(s=>{
    const mkr=L.circleMarker([s.lat,s.lng],{
      radius:10,color:'#999',fillColor:'#eee',fillOpacity:1,weight:2,opacity:0.9
    }).bindPopup(`
      <div class="popupContent">
        <h3>${s.name}</h3>
        <div class="code">${s.code} · ${s.short}</div>
        <div class="road">${s.road}</div>
        <div class="loading" id="arr-${s.code}">Loading arrivals...</div>
      </div>
    `).on('popupopen',()=>fetchArrivals(s.code,s.name));
    // Add letter label
    const icon=L.divIcon({
      className:'bus-label',
      html:`<div style="font-size:8px;font-weight:700;color:#555;text-align:center;line-height:20px">${s.short}</div>`,
      iconSize:[20,20],iconAnchor:[10,10]
    });
    const label=L.marker([s.lat,s.lng],{icon,zIndexOffset:1000,interactive:false});
    layer.addLayer(mkr);
    layer.addLayer(label);
  });
  return layer;
}

// ===== LTA API =====
async function fetchLTA(endpoint){
  try{
    const resp=await fetch(`https://datamall2.mytransport.sg/ltaodataservice/${endpoint}`,{
      headers:{AccountKey:LTA_API_KEY}
    });
    if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
    const data=await resp.json();
    return data.value||[];
  }catch(e){
    console.error('LTA API error:',e);
    return null;
  }
}

async function fetchArrivals(code,name){
  const el=document.getElementById(`arr-${code}`);
  if(!el)return;
  el.innerHTML='Loading arrivals...';
  el.className='loading';
  try{
    const resp=await fetch(`https://datamall2.mytransport.sg/ltaodataservice/BusArrivalv2?BusStopCode=${code}`,{
      headers:{AccountKey:LTA_API_KEY}
    });
    if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
    const data=await resp.json();
    const services=data.Services||[];
    if(services.length===0){
      el.innerHTML='<span class="error">No buses arriving</span>';
      return;
    }
    let html='<div class="arrivals">';
    services.slice(0,6).forEach(s=>{
      const t1=s.NextBus.EstimatedArrival;
      const t2=s.SubsequentBus.EstimatedArrival;
      const t1Str=t1?formatTime(t1):'-';
      const t2Str=t2?formatTime(t2):'-';
      html+=`<div class="arrival"><span class="svc">${s.ServiceNo}</span><span class="time ${t1Str==='Arr'?'arr':''}">${t1Str}</span><span style="color:#bbb;font-size:10px">${t2Str}</span></div>`;
    });
    html+='</div>';
    el.innerHTML=html;
    el.className='';
  }catch(e){
    el.innerHTML=`<span class="error">Error: ${e.message}</span>`;
    el.className='error';
  }
}

function formatTime(isoStr){
  if(!isoStr)return'-';
  const now=new Date();
  const arr=new Date(isoStr);
  const diff=Math.floor((arr-now)/60000);
  if(diff<0)return'Arr';
  if(diff===0)return'Arr';
  if(diff<60)return`${diff}m`;
  const h=Math.floor(diff/60);
  const m=diff%60;
  return`${h}h${m}m`;
}

async function fetchCarparkAvailability(name){
  const el=document.getElementById(`cp-${name.replace(/\\s/g,'')}`);
  if(!el)return;
  el.innerHTML='Checking...';
  el.className='loading';
  try{
    const data=await fetchLTA('CarParkAvailabilityv2');
    if(!data){el.innerHTML='<span class="error">Unavailable</span>';return}
    const cp=data.find(c=>c.Development?.toLowerCase().includes(name.toLowerCase().slice(0,6)));
    if(cp){
      const avail=cp.AvailableLots??'?';
      const total=cp.TotalLots??'?';
      el.innerHTML=`<span style="color:#34C759">${avail}/${total} lots</span>`;
    }else{
      el.innerHTML='<span style="color:#999">No live data</span>';
    }
    el.className='';
  }catch(e){
    el.innerHTML=`<span class="error">${e.message}</span>`;
  }
}

// ===== LAYER TOGGLES =====
function initLayers(){
  layers.bus=createBusLayer().addTo(map);
  layers.mrt=createMrtLayer().addTo(map);
  layers.carpark=createCarparkLayer();
  layers.traffic=createTrafficLayer();
}

function toggleLayer(name){
  const idx={bus:0,mrt:1,carpark:2,traffic:3}[name];
  state[name]=!state[name];
  const btn=document.querySelectorAll('.layerBtn')[idx];
  btn.classList.toggle('active',state[name]);
  if(state[name]){map.addLayer(layers[name])}
  else{map.removeLayer(layers[name])}
}

// ===== LOCATE =====
function locateMe(){
  if(!navigator.geolocation){alert('Geolocation not supported');return}
  state.locating=true;
  document.getElementById('locateBtn').classList.add('active');
  document.getElementById('locateBtn').textContent='⏳';
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const{latitude,longitude}=pos.coords;
      if(userMarker)map.removeLayer(userMarker);
      if(userCircle)map.removeLayer(userCircle);
      userMarker=L.marker([latitude,longitude],{
        icon:L.divIcon({
          html:'<div style="width:20px;height:20px;border-radius:10px;background:#007AFF;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3)"></div>',
          iconSize:[20,20],iconAnchor:[10,10]
        })
      }).addTo(map).bindPopup('<div class="popupContent"><h3>📍 You are here</h3></div>');
      userCircle=L.circle([latitude,longitude],{
        radius:50,color:'#007AFF',fillColor:'#007AFF',fillOpacity:0.08,weight:2
      }).addTo(map);
      map.setView([latitude,longitude],15);
      document.getElementById('locateBtn').textContent='📍';
      state.locating=false;
    },
    err=>{
      document.getElementById('locateBtn').textContent='📍';
      document.getElementById('locateBtn').classList.remove('active');
      state.locating=false;
      if(err.code===1)alert('Please allow location access in your browser settings');
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:30000}
  );
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>{
  initLayers();
  // Auto locate on load
  if(navigator.geolocation){
    setTimeout(locateMe,500);
  }
});
