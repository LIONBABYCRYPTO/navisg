<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; }
canvas { width: 512px; height: 512px; image-rendering: auto; }
</style>
</head>
<body>
<canvas id="c" width="1024" height="1024"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 1024;

// Offscreen for 2x supersampling
const os = document.createElement('canvas');
os.width = 1024;
os.height = 1024;
const o = os.getContext('2d');

const rr = (x, y, w, h, r) => {
  o.beginPath();
  o.moveTo(x + r, y);
  o.lineTo(x + w - r, y);
  o.quadraticCurveTo(x + w, y, x + w, y + r);
  o.lineTo(x + w, y + h - r);
  o.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  o.lineTo(x + r, y + h);
  o.quadraticCurveTo(x, y + h, x, y + h - r);
  o.lineTo(x, y + r);
  o.quadraticCurveTo(x, y, x + r, y);
  o.closePath();
};

// Background
rr(0, 0, 1024, 1024, 180);
o.fillStyle = '#1565C0';
o.fill();

// Depth circles
o.beginPath(); o.arc(180, 180, 250, 0, Math.PI*2); o.fillStyle = 'rgba(30,120,214,0.3)'; o.fill();
o.beginPath(); o.arc(800, 780, 280, 0, Math.PI*2); o.fillStyle = 'rgba(13,71,160,0.25)'; o.fill();

// Map pin circle
const cx = 512, cy = 490, cr = 300;
o.beginPath(); o.arc(cx, cy, cr, 0, Math.PI*2); o.fillStyle = '#FFFFFF'; o.fill();
o.strokeStyle = '#FFC107'; o.lineWidth = 10; o.stroke();

// Pin tail
const pY = cy + cr;
o.beginPath();
o.moveTo(cx - 48, pY);
o.lineTo(cx + 48, pY);
o.lineTo(cx, pY + 80);
o.closePath();
o.fillStyle = '#FFFFFF'; o.fill();
o.strokeStyle = '#FFC107'; o.lineWidth = 8; o.lineCap = 'round';
o.beginPath(); o.moveTo(cx - 42, pY); o.lineTo(cx - 4, pY + 75); o.stroke();
o.beginPath(); o.moveTo(cx + 42, pY); o.lineTo(cx + 4, pY + 75); o.stroke();

// Bus
const bx = cx - 115, by = cy - 52, bw = 230, bh = 112;
rr(bx, by, bw, bh, 14);
o.fillStyle = '#212121'; o.fill();

// Windows
const wc = '#90CAF9';
for (let row = 0; row < 2; row++) {
  const wy = row === 0 ? by + 10 : by + 52;
  for (let i = 0; i < 3; i++) {
    const wx = bx + 16 + i * 68;
    rr(wx, wy, 54, 30, 6);
    o.fillStyle = wc; o.fill();
  }
}

// Gold stripe
o.fillStyle = '#FFC107'; o.fillRect(bx + 14, by + 42, bw - 28, 6);

// Wheels
[[bx + 42, by + bh], [bx + bw - 42, by + bh]].forEach(([wx, wy]) => {
  o.beginPath(); o.arc(wx + 18, wy + 18, 19, 0, Math.PI*2); o.fillStyle = '#FFC107'; o.fill();
  o.beginPath(); o.arc(wx + 18, wy + 18, 14, 0, Math.PI*2); o.fillStyle = '#212121'; o.fill();
});

// Roof highlight
o.fillStyle = 'rgba(255,255,255,0.12)'; rr(bx + 10, by + 1, bw - 20, 4, 2); o.fill();

// Outer ring
rr(6, 6, 1012, 1012, 177);
o.strokeStyle = '#FFC107'; o.lineWidth = 6; o.stroke();
rr(10, 10, 1004, 1004, 173);
o.strokeStyle = 'rgba(255,255,255,0.3)'; o.lineWidth = 2; o.stroke();

// Scale to final
const imgData = o.getImageData(0, 0, 1024, 1024);

// Draw to visible canvas at half size
ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = 'high';
ctx.drawImage(os, 0, 0, 512, 512);

// Also save original
const link = document.createElement('a');
link.download = 'app_icon_1024.png';
os.toBlob(blob => {
  const url = URL.createObjectURL(blob);
  link.href = url;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
